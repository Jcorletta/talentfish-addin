<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TalentFish Interview Scheduler</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #252525;
      background: #f5f5f5;
      height: 100vh;
      overflow-y: auto;
    }

    .header {
      background: #1a3a5c;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-logo span { color: #4fc3f7; }

    .header-sub {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 1px;
    }

    .content { padding: 14px 16px; }

    .parse-btn {
      width: 100%;
      background: #1a3a5c;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 14px;
      transition: background 0.15s;
    }

    .parse-btn:hover { background: #15304d; }
    .parse-btn:disabled { background: #9aacbc; cursor: default; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .field-group { margin-bottom: 12px; }

    .field-group label {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 3px;
    }

    .field-group input,
    .field-group textarea,
    .field-group select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      background: white;
      color: #252525;
      outline: none;
      transition: border-color 0.15s;
    }

    .field-group input:focus,
    .field-group textarea:focus { border-color: #1a3a5c; }

    .field-group textarea { resize: vertical; min-height: 60px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 14px 0;
    }

    .create-btn {
      width: 100%;
      background: #059669;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .create-btn:hover { background: #047857; }
    .create-btn:disabled { background: #9cccba; cursor: default; }

    .status-box {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    .status-box.success {
      background: #ecfdf5;
      border: 1px solid #6ee7b7;
      color: #065f46;
      display: block;
    }

    .status-box.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      display: block;
    }

    .status-box.info {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      color: #1e40af;
      display: block;
    }

    .not-interview-msg {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      color: #92400e;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }

    #formSection { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">Talent<span>Fish</span></div>
    <div class="header-sub">Interview Scheduler</div>
  </div>
</div>

<div class="content">

  <button class="parse-btn" id="parseBtn" onclick="parseEmail()">
    <div class="spinner" id="parseSpinner"></div>
    <span id="parseBtnLabel">📋 Parse This Email</span>
  </button>

  <div class="not-interview-msg" id="notInterviewMsg">
    This email doesn't appear to be an interview notification. Open a JobDiva interview scheduled email and try again.
  </div>

  <div id="formSection">
    <div class="section-label">Interview Details</div>

    <div class="field-group">
      <label>Candidate Name</label>
      <input type="text" id="candidateName" placeholder="e.g. Patrick J. Keefe"/>
    </div>

    <div class="field-group">
      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="e.g. Technical Project Manager"/>
    </div>

    <div class="field-group">
      <label>Client / Company</label>
      <input type="text" id="client" placeholder="e.g. UL Standards & Engagement"/>
    </div>

    <div class="row-2">
      <div class="field-group">
        <label>Interview Date</label>
        <input type="date" id="interviewDate"/>
      </div>
      <div class="field-group">
        <label>Interview Time</label>
        <input type="time" id="interviewTime"/>
      </div>
    </div>

    <div class="row-2">
      <div class="field-group">
        <label>Duration</label>
        <select id="duration">
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60" selected>1 hour</option>
          <option value="90">90 min</option>
        </select>
      </div>
      <div class="field-group">
        <label>Interview Type</label>
        <select id="interviewType">
          <option value="Video">Video</option>
          <option value="Phone">Phone</option>
          <option value="On-site">On-site</option>
        </select>
      </div>
    </div>

    <div class="field-group">
      <label>Hiring Manager / Contact</label>
      <input type="text" id="hiringManager" placeholder="e.g. Michael Beckman"/>
    </div>

    <div class="field-group">
      <label>Recruiter</label>
      <input type="text" id="recruiter" placeholder="e.g. Megan Brantner"/>
    </div>

    <div class="field-group">
      <label>Location / Link</label>
      <input type="text" id="location" placeholder="Teams link, Zoom URL, or address"/>
    </div>

    <div class="field-group">
      <label>Notes (optional)</label>
      <textarea id="notes" placeholder="Pay rate, onsite details, candidate notes..."></textarea>
    </div>

    <div class="field-group">
      <label>Candidate Email (to invite)</label>
      <input type="email" id="candidateEmail" placeholder="candidate@email.com"/>
    </div>

    <hr class="divider"/>

    <button class="create-btn" id="createBtn" onclick="createInvite()">
      <div class="spinner" id="createSpinner"></div>
      <span id="createBtnLabel">📅 Create Calendar Invite</span>
    </button>

    <div class="status-box" id="statusBox"></div>
  </div>

</div>

<script>
Office.onReady(function(info) {
  if (info.host === Office.HostType.Outlook) {
    console.log('TalentFish add-in ready');
  }
});

function parseEmail() {
  const btn = document.getElementById('parseBtn');
  const spinner = document.getElementById('parseSpinner');
  const label = document.getElementById('parseBtnLabel');

  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = 'Parsing...';

  const item = Office.context.mailbox.item;

  item.body.getAsync(Office.CoercionType.Text, function(result) {
    if (result.status !== Office.AsyncResultStatus.Succeeded) {
      showError('Could not read email body. Please try again.');
      resetParseBtn();
      return;
    }

    const subject = item.subject || '';
    const body = result.value || '';
    const fullText = 'SUBJECT: ' + subject + '\n\nBODY:\n' + body;

    // Check if it looks like an interview-related email
    const isInterview = /interview|scheduled.*interview|interview.*scheduled/i.test(subject + body);
    if (!isInterview) {
      document.getElementById('notInterviewMsg').style.display = 'block';
      document.getElementById('formSection').style.display = 'none';
      resetParseBtn();
      return;
    }

    document.getElementById('notInterviewMsg').style.display = 'none';

    // Call Claude API to parse
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a recruiting assistant. Extract structured interview data from emails. Return ONLY valid JSON, no markdown, no backticks, no explanation. Fields: { candidateName, jobTitle, client, interviewDate (YYYY-MM-DD or null), interviewTime (HH:MM 24hr or null), hiringManager, recruiter, location, candidateEmail, interviewType (Video/Phone/On-site), notes }. Use null for missing fields.',
        messages: [{ role: 'user', content: 'Extract interview details from this email:\n\n' + fullText.substring(0, 4000) }]
      })
    })
    .then(r => r.json())
    .then(data => {
      const text = data.content && data.content[0] && data.content[0].text ? data.content[0].text : '{}';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      populateForm(parsed);
      document.getElementById('formSection').style.display = 'block';
      resetParseBtn();
      label.textContent = '🔄 Re-parse Email';
    })
    .catch(err => {
      // Fallback: try regex parsing without API
      const parsed = regexParse(subject, body);
      populateForm(parsed);
      document.getElementById('formSection').style.display = 'block';
      resetParseBtn();
      label.textContent = '🔄 Re-parse Email';
    });
  });
}

function regexParse(subject, body) {
  const get = (pattern) => {
    const m = body.match(pattern);
    return m ? m[1].trim() : null;
  };

  // Parse date like "05/04/26 10:30 AM"
  let interviewDate = null;
  let interviewTime = null;
  const dateMatch = body.match(/Interview Date[:\s]+(\d{2})\/(\d{2})\/(\d{2})\s+(\d{1,2}:\d{2}\s*[AP]M)/i);
  if (dateMatch) {
    interviewDate = '20' + dateMatch[3] + '-' + dateMatch[1] + '-' + dateMatch[2];
    // Convert to 24hr
    const t = dateMatch[4].trim();
    const [hm, period] = t.split(/\s+/);
    let [hh, mm] = hm.split(':');
    hh = parseInt(hh);
    if (period === 'PM' && hh !== 12) hh += 12;
    if (period === 'AM' && hh === 12) hh = 0;
    interviewTime = String(hh).padStart(2,'0') + ':' + mm;
  }

  // Extract candidate from subject "interview with [Name]"
  const candidateMatch = body.match(/interview with ([A-Z][a-z]+ [A-Z]\.? ?[A-Z][a-z]+)/);
  const candidateName = candidateMatch ? candidateMatch[1] : null;

  return {
    candidateName,
    jobTitle: get(/Job Title[:\s]+([^\n<]+)/i),
    client: get(/Company[:\s]+([^\n<]+)/i),
    interviewDate,
    interviewTime,
    hiringManager: get(/(?:Submitted To|Contact)[:\s]+([^\n<]+)/i),
    recruiter: get(/Recruited By[:\s]+([^\n<]+)/i),
    location: get(/Location[:\s]+([^\n<]+)/i),
    candidateEmail: get(/Email[:\s]+([\w.+-]+@[\w.-]+\.\w+)/i),
    interviewType: /video/i.test(body) ? 'Video' : 'Phone',
    notes: get(/Agreed Pay Rate[:\s]+([^\n<]+)/i) ? 'Pay Rate: ' + get(/Agreed Pay Rate[:\s]+([^\n<]+)/i) : null
  };
}

function populateForm(data) {
  setValue('candidateName', data.candidateName);
  setValue('jobTitle', data.jobTitle);
  setValue('client', data.client);
  setValue('interviewDate', data.interviewDate);
  setValue('interviewTime', data.interviewTime);
  setValue('hiringManager', data.hiringManager);
  setValue('recruiter', data.recruiter);
  setValue('location', data.location);
  setValue('candidateEmail', data.candidateEmail);
  setValue('notes', data.notes);
  if (data.interviewType) {
    const sel = document.getElementById('interviewType');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === data.interviewType) { sel.selectedIndex = i; break; }
    }
  }
}

function setValue(id, val) {
  const el = document.getElementById(id);
  if (el && val) el.value = val;
}

function createInvite() {
  const btn = document.getElementById('createBtn');
  const spinner = document.getElementById('createSpinner');
  const label = document.getElementById('createBtnLabel');

  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = 'Creating...';

  const candidateName = document.getElementById('candidateName').value;
  const jobTitle = document.getElementById('jobTitle').value;
  const client = document.getElementById('client').value;
  const dateVal = document.getElementById('interviewDate').value;
  const timeVal = document.getElementById('interviewTime').value;
  const duration = parseInt(document.getElementById('duration').value);
  const hiringManager = document.getElementById('hiringManager').value;
  const recruiter = document.getElementById('recruiter').value;
  const location = document.getElementById('location').value;
  const notes = document.getElementById('notes').value;
  const candidateEmail = document.getElementById('candidateEmail').value;
  const interviewType = document.getElementById('interviewType').value;

  if (!candidateName || !dateVal || !timeVal) {
    showError('Please fill in Candidate Name, Date, and Time before creating the invite.');
    resetCreateBtn();
    return;
  }

  // Build start/end Date objects
  const startDateTime = new Date(dateVal + 'T' + timeVal + ':00');
  const endDateTime = new Date(startDateTime.getTime() + duration * 60000);

  const subject = 'Interview: ' + candidateName + ' — ' + jobTitle + ' @ ' + client;

  const body =
    'Interview Details\n' +
    '─────────────────────────────\n' +
    'Candidate:      ' + candidateName + '\n' +
    'Role:           ' + jobTitle + '\n' +
    'Client:         ' + client + '\n' +
    'Interview Type: ' + interviewType + '\n' +
    'Hiring Manager: ' + (hiringManager || 'TBD') + '\n' +
    'Recruiter:      ' + (recruiter || 'TBD') + '\n' +
    (location ? 'Location/Link:  ' + location + '\n' : '') +
    (notes ? '\nNotes:\n' + notes + '\n' : '') +
    '\n─────────────────────────────\n' +
    'Scheduled by TalentFish Interview Scheduler';

  // Build attendees list
  const requiredAttendees = [];
  if (candidateEmail) {
    requiredAttendees.push({ emailAddress: candidateEmail });
  }

  // Create the appointment using Office.js
  Office.context.mailbox.displayNewAppointmentForm({
    subject: subject,
    start: startDateTime,
    end: endDateTime,
    location: location || interviewType + ' Interview',
    body: body,
    requiredAttendees: requiredAttendees
  });

  showSuccess('Calendar invite opened! Review the details and click Send.');
  resetCreateBtn();
  label.textContent = '📅 Create Another Invite';
}

function showSuccess(msg) {
  const box = document.getElementById('statusBox');
  box.className = 'status-box success';
  box.textContent = '✓ ' + msg;
}

function showError(msg) {
  const box = document.getElementById('statusBox');
  box.className = 'status-box error';
  box.textContent = '✗ ' + msg;
}

function resetParseBtn() {
  document.getElementById('parseBtn').disabled = false;
  document.getElementById('parseSpinner').style.display = 'none';
}

function resetCreateBtn() {
  document.getElementById('createBtn').disabled = false;
  document.getElementById('createSpinner').style.display = 'none';
  document.getElementById('createBtnLabel').textContent = '📅 Create Calendar Invite';
}
</script>
</body>
</html>
